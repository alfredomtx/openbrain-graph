<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBrain</title>
  <script type="module" crossorigin src="/openbrain-graph/assets/index-CsqDQ6lx.js"></script>
  <link rel="stylesheet" crossorigin href="/openbrain-graph/assets/index-D5QdB57T.css">
</head>
<body>
  <div id="app">
    <div id="graph-container"></div>

    <!-- Top bar -->
    <div id="topbar">
      <div id="brand">🧠 OpenBrain</div>
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Search entities..." autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div id="stats-bar">
        <span id="stat-total"></span>
      </div>
      <button id="logout-btn" title="Logout">⏻</button>
    </div>

    <!-- Filter sidebar -->
    <div id="filters">
      <div class="filter-section">
        <div class="filter-title">Entity Types</div>
        <div id="type-filters"></div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Min Connections</div>
        <div class="slider-wrap">
          <input id="min-connections" type="range" min="0" max="10" value="0" />
          <span id="min-conn-val">0</span>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Min Mentions</div>
        <div class="slider-wrap">
          <input id="min-mentions" type="range" min="0" max="20" value="0" />
          <span id="min-mentions-val">0</span>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Media Types</div>
        <div id="media-type-filters"></div>
      </div>
      <div class="filter-section">
        <span id="visible-count"></span>
      </div>
    </div>

    <!-- Detail panel -->
    <div id="panel" class="hidden">
      <div id="panel-close">✕</div>
      <div id="panel-type"></div>
      <div id="panel-content"></div>
      <div id="panel-meta"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" style="display:none; position:fixed; inset:0; background:#0a0a0f; z-index:1000; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
      <div style="text-align:center; margin-bottom:10px;">
        <div style="font-size:2em; margin-bottom:4px;">🧠</div>
        <div style="font-size:1.3em; font-weight:700; background:linear-gradient(135deg,#7c3aed,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">OpenBrain</div>
        <div style="color:#555; font-size:0.85em; margin-top:4px;">Sign in to view your knowledge graph</div>
      </div>
      <form id="login-form" style="display:flex; flex-direction:column; gap:12px; width:280px;">
        <input id="login-email" type="email" placeholder="Email" required
          style="background:#1a1a2e; border:1px solid #2a2a4a; border-radius:8px; color:#e0e0e0; padding:10px 14px; font-size:14px; outline:none;">
        <input id="login-password" type="password" placeholder="Password" required
          style="background:#1a1a2e; border:1px solid #2a2a4a; border-radius:8px; color:#e0e0e0; padding:10px 14px; font-size:14px; outline:none;">
        <button type="submit"
          style="background:#7c3aed; border:none; border-radius:8px; color:white; padding:10px; font-size:14px; font-weight:600; cursor:pointer;">
          Sign In
        </button>
        <div id="login-error" style="color:#ef4444; font-size:12px; text-align:center; min-height:16px;"></div>
      </form>
    </div>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading...</div>
    </div>
  </div>
</body>
</html>
