<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBrain</title>
  <script type="module" crossorigin src="/openbrain-graph/assets/index-sCMtQmEN.js"></script>
  <link rel="stylesheet" crossorigin href="/openbrain-graph/assets/index-CupSvdZ_.css">
</head>
<body>
  <div id="app">
    <div id="graph-container"></div>

    <!-- Top bar -->
    <div id="topbar">
      <div id="brand">🧠 OpenBrain</div>
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Search entities..." autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div id="stats-bar">
        <span id="stat-total"></span>
      </div>
      <button id="logout-btn" title="Logout">⏻</button>
    </div>

    <!-- Filter sidebar -->
    <div id="filters">
      <div class="filter-section">
        <div class="filter-title">Entity Types</div>
        <div id="type-filters"></div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Min Connections</div>
        <div class="slider-wrap">
          <input id="min-connections" type="range" min="0" max="10" value="0" />
          <span id="min-conn-val">0</span>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Min Mentions</div>
        <div class="slider-wrap">
          <input id="min-mentions" type="range" min="0" max="20" value="0" />
          <span id="min-mentions-val">0</span>
        </div>
      </div>
      <div class="filter-section">
        <span id="visible-count" style="color:#888;font-size:11px;"></span>
      </div>
    </div>

    <!-- Detail panel -->
    <div id="panel" class="hidden">
      <div id="panel-close">✕</div>
      <div id="panel-type"></div>
      <div id="panel-name"></div>
      <div id="panel-meta"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen">
      <div class="login-brand">
        <div style="font-size:2em;">🧠</div>
        <div class="login-title">OpenBrain</div>
        <div class="login-sub">Sign in to view your knowledge graph</div>
      </div>
      <form id="login-form">
        <input id="login-email" type="email" placeholder="Email" required />
        <input id="login-password" type="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
        <div id="login-error"></div>
      </form>
    </div>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading...</div>
    </div>
  </div>
</body>
</html>
